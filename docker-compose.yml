version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: app-frontend:${VERSION:-latest}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: always
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: app-backend:${VERSION:-latest}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    env_file:
      - ./backend/.env
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
    volumes:
      - ./backend/uploads:/app/uploads

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Ayratech - Gestão de Promotores e Merchandising</title>
    <meta name="description" content="Plataforma completa de gestão de promotores, merchandising e comunicação via WhatsApp com IA" />
    <meta name="author" content="Thiago Nicodemos" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ayratech" />
    <meta name="application-name" content="Ayratech" />
    <meta name="msapplication-TileColor" content="#3b82f6" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- PWA Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/ayratech-logo.jpg" />
    
    <!-- Splash Screens for iOS -->
    <link rel="apple-touch-startup-image" href="/icons/splash-640x1136.png" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-1242x2208.png" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:title" content="Ayratech - Gestão de Promotores e Merchandising" />
    <meta property="og:description" content="Plataforma completa de gestão de promotores, merchandising e comunicação via WhatsApp com IA" />
    <meta property="og:type" content="website" />
  </head>

  <body>
    <!-- Splash Screen -->
    <div id="splash" style="position:fixed;inset:0;z-index:99999;background:#000;display:flex;align-items:center;justify-content:center;transition:opacity .5s ease">
      <video id="splash-video" autoplay muted playsinline style="max-width:60%;max-height:60%;object-fit:contain">
        <source src="/logo-intro.mp4" type="video/mp4" />
      </video>
    </div>
    <div id="root" style="visibility:hidden"></div>
    <!-- Desenvolvido por Thiago Nicodemos -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

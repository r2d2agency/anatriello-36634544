<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Gestão Anatriello</title>
    <meta name="description" content="Sistema de gestão Anatriello" />
    <meta name="author" content="Thiago Nicodemos" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gestão Anatriello" />
    <meta name="application-name" content="Gestão Anatriello" />
    <meta name="msapplication-TileColor" content="#3b82f6" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- PWA Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Splash Screens for iOS -->
    <link rel="apple-touch-startup-image" href="/icons/splash-640x1136.png" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-1242x2208.png" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />


    <!-- Open Graph -->
    <meta property="og:title" content="Gestão Anatriello" />
    <meta property="og:description" content="Sistema de gestão Anatriello" />
    <meta property="og:type" content="website" />
  </head>

  <body>
    <!-- Splash Screen - only for promotor/supervisor mobile routes -->
    <div id="splash" style="position:fixed;inset:0;z-index:99999;background:#fff;display:flex;align-items:center;justify-content:center;transition:opacity .5s ease;display:none">
      <img id="splash-logo" src="/anatriello-logo.png" alt="Anatriello" style="max-width:60%;max-height:60%;object-fit:contain" />
    </div>
    <div id="root"></div>
    <script>
      (function(){
        var isPromotor = /^\/promotor(\/|$)/.test(window.location.pathname);
        var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 768;
        var splash = document.getElementById('splash');
        var root = document.getElementById('root');
        if(isPromotor && isMobile && splash){
          splash.style.display = 'flex';
          root.style.visibility = 'hidden';
          setTimeout(function(){ if(splash){ splash.style.opacity='0'; setTimeout(function(){ splash.remove(); if(root) root.style.visibility=''; },500); } }, 1200);
        } else if(splash){
          splash.remove();
        }
      })();
    </script>
    <!-- Desenvolvido por Thiago Nicodemos -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
